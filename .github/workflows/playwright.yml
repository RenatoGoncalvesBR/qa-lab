name: QA Lab Pipeline

on:
  push:
    branches: [ main ]

jobs:
  qa-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependências
        run: npm install

      - name: Instalar browsers Playwright
        run: npx playwright install --with-deps

      - name: Rodar testes de API
        run: npx playwright test api

      - name: Rodar testes E2E
        run: npx playwright test tests

      - name: Instalar k6
        run: |
          sudo apt update
          sudo apt install -y gnupg software-properties-common
          curl -s https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt update
          sudo apt install k6 -y

      - name: Rodar teste de performance
        run: k6 run loadtest.js